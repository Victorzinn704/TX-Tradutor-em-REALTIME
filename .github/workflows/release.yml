name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage release bundle
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "realtime-translator-release"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $items = @(
            ".github",
            "docs",
            "rtxlator",
            "runtime-rs",
            ".gitignore",
            "APRESENTACAO_TECNICA_COMPLETA.md",
            "ARCHITECTURE.md",
            "README.md",
            "baixar_opus_pt_en.bat",
            "compilar_rust.bat",
            "criar_atalhos.ps1",
            "diagnostico.bat",
            "diagnostico.py",
            "gerenciar_contexto.py",
            "instalar.bat",
            "listar_dispositivos.bat",
            "pyproject.toml",
            "realtime_translator.py",
            "requirements.txt",
            "rodar.bat",
            "test_context_manager.py",
            "test_realtime_translator.py",
            "test_source_profiles.py",
            "test_text_processing.py",
            "tests",
            "texto_bridge.py"
          )

          foreach ($item in $items) {
            if (Test-Path $item) {
              Copy-Item $item -Destination $stage -Recurse -Force
            }
          }

          $artifact = Join-Path $env:RUNNER_TEMP "realtime-translator.zip"
          if (Test-Path $artifact) { Remove-Item $artifact -Force }
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $artifact -Force
          "ARTIFACT_PATH=$artifact" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: realtime-translator-release
          path: ${{ env.ARTIFACT_PATH }}
